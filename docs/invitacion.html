<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jhon & Bárbara</title>

<link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --azul:#8FA8C2;
    --azul-claro:#AFC2D6;
    --azul-fondo:#EDF4F9;
    --dorado:#C9B27A;
    --texto:#6D7882;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    font-family:'Cormorant Garamond',serif;

    background:
    linear-gradient(
        180deg,
        #FAFBFC 0%,
        #F4F8FB 50%,
        #EEF4F8 100%
    );

    overflow-x:hidden;
}

/* ========================= */
/* PORTADA */
/* ========================= */

.hero{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:60px 20px;

    position:relative;

    overflow:hidden;
}

/* ========================= */
/* BORDE FLORAL */
/* ========================= */

.borde-portada{

    position:absolute;

    top:0;
    left:50%;

    transform:translateX(-50%);

    width:100%;
    max-width:900px;

    height:100%;

    object-fit:fill;

    z-index:1;

    pointer-events:none;

    opacity:.95;
}

/* ========================= */
/* CONTENIDO */
/* ========================= */

.card{

    width:100%;
    max-width:500px;

    text-align:center;

    position:relative;

    z-index:10;

    padding:0px 20px;
}

/* ========================= */
/* FOTO */
/* ========================= */

.photo-frame{

    width:300px;
    height:300px;

    margin:auto;

    position:relative;
}

.marco{

    position:absolute;

    width:100%;
    height:100%;

    object-fit:contain;

    top:0;
    left:0;

    z-index:1;
}

.foto{

    position:absolute;

    width:250px;
    height:250px;

    border-radius:50%;

    object-fit:cover;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    z-index:2;

    box-shadow:
    0 15px 40px rgba(0,0,0,.12);
}

/* ========================= */
/* TITULOS */
/* ========================= */

.subtitle{

    margin-top:10px;

    letter-spacing:6px;

    font-size:.85rem;

    color:var(--dorado);
}

.names{

    margin-top:10px;

    font-family:'Parisienne',cursive;

    font-size:4.8rem;

    line-height:1;

    color:var(--azul);

    text-shadow:
    0 5px 15px rgba(143,168,194,.15);
}

.date{

    margin-top:15px;

    letter-spacing:4px;

    font-size:1.15rem;

    color:var(--texto);
}

/* ========================= */
/* SEPARADOR */
/* ========================= */

.separator{

    width:180px;
    height:1px;

    margin:35px auto;

    background:var(--dorado);

    position:relative;
}

.separator::after{

    content:"✦";

    position:absolute;

    left:50%;
    top:-13px;

    transform:translateX(-50%);

    background:white;

    color:var(--dorado);

    padding:0 10px;
}

/* ========================= */
/* INVITADO */
/* ========================= */

.guest{

    color:#666;

    font-size:1rem;
}

.guest span{

    display:block;

    margin-top:10px;

    font-size:1.8rem;

    color:#497baa;

    font-weight:600;

    text-shadow:
        2px 2px 4px rgb(255, 255, 255),
        0 0 8px rgb(253, 249, 249);
}

/* ========================= */
/* BOTON */
/* ========================= */

.btn{

    display:inline-flex;

    justify-content:center;
    align-items:center;

    width:230px;
    height:72px;

    margin-top:40px;

    text-decoration:none;

    color:white;

    font-size:1.5rem;

    background:
    linear-gradient(
        135deg,
        #AFC2D6,
        #8FA8C2
    );

    border-radius:
    120px 120px 28px 28px /
    150px 150px 28px 28px;

    border:2px solid rgba(255,255,255,.8);

    box-shadow:
    0 15px 35px rgba(143,168,194,.25);

    transition:.3s;
}

.btn:hover{

    transform:translateY(-5px);

    box-shadow:
    0 20px 40px rgba(143,168,194,.35);
}

/* ========================= */
/* FRASE */
/* ========================= */

.frase{

    margin-top:35px;

    font-size:1.8rem;

    font-style:italic;

    font-weight:600;

    color:#ffffff;

    text-shadow:
        2px 2px 4px rgba(0,0,0,.45),
        0 0 8px rgba(0,0,0,.15);

    letter-spacing:.5px;

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media(max-width:768px){

    .borde-portada{

        width:100%;
        max-width:100%;
    }

    .photo-frame{

        width:260px;
        height:260px;
    }

    .foto{

        width:215px;
        height:215px;
    }

    .names{

        font-size:4.8rem;
    }

    .btn{

        width:210px;
    }
}

</style>
</head>

<body>

<section class="hero">

    <img src="borde.png"
         class="borde-portada"
         alt="">

    <div class="card">

        <div class="photo-frame">

            <img src="marco-floral.png"
                 class="marco"
                 alt="">

            <img src="imagenfoto2.png"
                 class="foto"
                 alt="Jhon y Bárbara">

        </div>

        <div class="subtitle">
            NUESTRA BODA
        </div>

        <h1 class="names">
            Jhon & Bárbara
        </h1>

        <div class="date">
            27 · JUNIO · 2026
        </div>

        <div class="separator"></div>

        <div class="guest">
            Tenemos el honor de invitar a
            <span>Sr. Yesenia Quispe y Familia</span>
        </div>

        <a href="#inicio" class="btn">
            ✦ INGRESAR ✦
        </a>

        <div class="frase">
            El comienzo de nuestro para siempre
        </div>

    </div>

</section>

</body>
</html>
